name: Deploy to GitHub Pages

# Build estático do dossiê (TanStack Start em modo node-server + prerender HTTP)
# e publicação no GitHub Pages a cada push na branch principal.
#
# Pré-requisitos no repositório (uma única vez):
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. Settings → Actions → General → Workflow permissions: "Read and write"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Para project site (repo "<algo>"): /<repo>/
      # Para user site (repo "<user>.github.io"): troque por "/"
      GH_PAGES_BASE: /${{ github.event.repository.name }}/
      NITRO_PRESET: node-server
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Node SSR bundle + client assets)
        run: bun run build

      - name: Prerender all routes to static HTML
        run: node scripts/prerender.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
